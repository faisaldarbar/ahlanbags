baseURL = "https://ahlanbags.com/"
languageCode = "en-us"
title = "Ahlan Bags"
theme = "PaperMod"

googleAnalytics = "G-YCMQXTYSX6"

[pagination]
  pagerSize = 10

[params]
  env = "production"
  author = "Ahlan Bags"
  defaultTheme = "auto"
  showReadingTime = true
  showCodeCopyButtons = true
  ShowPostNavLinks = true
  showBreadCrumbs = true
  showToc = true
  mainSections = ["posts"]
  ShowSearch = true
  ShowSocialIcons = true
  ShowCodeCopyButtons = true
  ShowShareButtons = true
  ShowPostIcons = true
  ShowFeaturedImageInList = true
  ShowFeaturedImageInPost = true
  images = ["/images/og-image.png"]

[params.cover]
    responsiveImages = false
    linkFullImages = true

[[params.socialIcons]]
  name = "facebook"
  url = "https://facebook.com/ahlanbags"

[[params.socialIcons]]
  name = "youtube"
  url = "https://www.youtube.com/@AhlanBags"

[[params.socialIcons]]
  name = "instagram"
  url = "https://www.instagram.com/ahlanbags"

[[params.socialIcons]]
  name = "whatsapp"
  url = "https://wa.me/919765011119"

[[params.socialIcons]]
  name = "at"
  url = "mailto:faisal@faisaldarbar.com"

[taxonomies]
  tag = "tags"
  category = "categories"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2

  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 3

  [[menu.main]]
    name = "Archives"
    url = "/archives/"
    weight = 4

  [[menu.main]]
    name = "Categories"
    url = "/categories/"
    weight = 5

  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 6

  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 7

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = [ "HTML", "RSS", "JSON" ]


